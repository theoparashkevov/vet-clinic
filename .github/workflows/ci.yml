name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect changes to optimize CI runs
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'package*.json'
            web:
              - 'web/**'
              - 'package*.json'

  # Install dependencies once and cache
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  # API checks
  api-checks:
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: ${{ needs.changes.outputs.api == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Type check API
        working-directory: ./api
        run: npx tsc --noEmit

      - name: Build API
        run: npm -w api run build

      - name: Upload API build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: |
            api/dist
            api/package.json
            api/prisma
          retention-days: 7

  # Web checks
  web-checks:
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Type check Web
        working-directory: ./web
        run: npx tsc --noEmit

      - name: Build Web
        run: npm -w web run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Upload Web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            web/.next
            web/package.json
            web/public
          retention-days: 7

  # Run tests
  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm -w api test

      - name: Run Web tests
        run: npm -w web test

  # Docker build verification
  docker-build:
    runs-on: ubuntu-latest
    needs: [api-checks, web-checks]
    if: always() && (needs.api-checks.result == 'success' || needs.web-checks.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: vet-clinic-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          tags: vet-clinic-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # E2E Tests with Playwright
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [install, changes]
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./web
        run: npx playwright install chromium firefox webkit

      - name: Build Web
        run: npm -w web run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Run E2E tests
        working-directory: ./web
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

  # Summary
  ci-summary:
    runs-on: ubuntu-latest
    needs: [api-checks, web-checks, test, docker-build, e2e-tests]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Checks | ${{ needs.api-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Checks | ${{ needs.web-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
