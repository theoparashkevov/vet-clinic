version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vet
      POSTGRES_PASSWORD: vet
      POSTGRES_DB: vet
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  api:
    build: ./api
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://vet:vet@db:5432/vet?schema=public
    ports:
      - "3000:3000"
    depends_on:
      - db
volumes:
  db_data:
