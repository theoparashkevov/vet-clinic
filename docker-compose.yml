services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vet
      POSTGRES_PASSWORD: vet
      POSTGRES_DB: vet
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  api:
    build: ./api
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://vet:vet@db:5432/vet?schema=public
      - CORS_ORIGIN=http://localhost:3001,http://localhost:3000
      - JWT_SECRET=change-me-in-production
      - JWT_EXPIRES_IN=8h
    ports:
      - "3000:3000"
    depends_on:
      - db
    command: sh -c "npm run prisma:use:postgres && npm run prisma:generate && npx prisma db push && npm start"
  web:
    build: ./web
    environment:
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - api
volumes:
  db_data:
