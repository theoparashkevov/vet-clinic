services:
  db:
    image: postgres:16-alpine
    container_name: vet-clinic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vet}
      POSTGRES_DB: ${POSTGRES_DB:-vet}
    ports:
      - "192.168.0.91:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vet} -d ${POSTGRES_DB:-vet}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vet-clinic-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-vet}:${POSTGRES_PASSWORD:-vet}@db:5432/${POSTGRES_DB:-vet}?schema=public
      JWT_SECRET: ${JWT_SECRET:-demo-secret-do-not-use-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      DEMO_MODE: ${DEMO_MODE:-false}
      DEMO_MAX_OPERATIONS_PER_HOUR: ${DEMO_MAX_OPERATIONS_PER_HOUR:-100}
      DEMO_DATA_SEED_ON_STARTUP: ${DEMO_DATA_SEED_ON_STARTUP:-true}
      DEMO_RATE_LIMIT_WINDOW_MS: ${DEMO_RATE_LIMIT_WINDOW_MS:-60000}
      DEMO_RATE_LIMIT_MAX_REQUESTS: ${DEMO_RATE_LIMIT_MAX_REQUESTS:-30}
      CLINIC_NAME: ${CLINIC_NAME:-Vet Clinic}
      CLINIC_PHONE: ${CLINIC_PHONE:-}
    ports:
      - "192.168.0.91:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-new:
    build:
      context: ./web-new
      dockerfile: Dockerfile
    container_name: vet-clinic-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_DEMO_MODE: ${DEMO_MODE:-false}
    ports:
      - "192.168.0.91:8089:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
